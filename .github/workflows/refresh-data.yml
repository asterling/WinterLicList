name: Refresh menu data

on:
  schedule:
    # 10:00 UTC daily ≈ 6 AM Toronto (EDT) / 5 AM (EST)
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Fetch latest menus
        run: python winterlic.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain '*.json')" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add *.json
            git commit -m "chore: refresh menu data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No menu changes."
          fi
