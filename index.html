<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winterlicious / Summerlicious — Toronto Prix-Fixe Menus, Map & Filters</title>
    <meta name="description" content="Browse every Winterlicious and Summerlicious menu in Toronto. Faster than the official site, with a map, neighbourhood filters, vegetarian/vegan tags, Michelin highlights, and shareable links.">
    <meta name="theme-color" content="#0056b3">
    <link rel="canonical" href="https://asterling.github.io/WinterLicList/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Winterlicious 2026 Menu Explorer">
    <meta property="og:title" content="Winterlicious 2026 — Toronto Prix-Fixe Menus">
    <meta property="og:description" content="Every Winterlicious 2026 menu in one place. Map view, filters, favorites, Michelin highlights.">
    <meta property="og:url" content="https://asterling.github.io/WinterLicList/">
    <meta property="og:image" content="https://asterling.github.io/WinterLicList/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Winterlicious 2026 — Toronto Prix-Fixe Menus">
    <meta name="twitter:description" content="Every Winterlicious 2026 menu in one place. Map view, filters, favorites, Michelin highlights.">
    <meta name="twitter:image" content="https://asterling.github.io/WinterLicList/og-image.png">

    <!-- Favicon (inline SVG: snowflake + cutlery vibe) -->
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230056b3'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='40' font-family='Arial' fill='%23ffd700'>❄</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="styles.css">

    <!-- Structured data for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Winterlicious 2026 Menu Explorer",
      "url": "https://asterling.github.io/WinterLicList/",
      "description": "Unofficial Winterlicious 2026 menu browser for Toronto, with map, filters and favorites.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://asterling.github.io/WinterLicList/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
</head>
<body>

<header>
    <div class="container header-inner">
        <div class="header-text">
            <h1 id="seasonTitle">Toronto Prix-Fixe Menus</h1>
            <p id="seasonSubtitle">Explore Toronto's Culinary Celebration</p>
        </div>
        <div class="header-actions">
            <button id="surpriseBtn" class="header-btn" title="Pick a random restaurant">🎲 Surprise me</button>
            <button id="themeBtn" class="header-btn icon-only" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
        </div>
    </div>
</header>

<main class="container">

    <div id="status-message"></div>

    <div id="file-input-container">
        <h2>Load Menu Data</h2>
        <p style="margin-bottom: 1rem; color: #666;">Unable to auto-load the data file (likely due to browser security restrictions on local files). <br>Please select <strong>winterlicious_menus_2026.json</strong> manually.</p>
        <input type="file" id="jsonFile" accept=".json" class="btn" />
    </div>

    <div id="app-content" style="display: none;">

        <div id="statsBanner" class="stats-banner" hidden></div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search restaurants, cuisines, or dishes (e.g. 'short rib')">
            </div>

            <div class="filter-select">
                <select id="sortBy" aria-label="Sort by">
                    <option value="default">Sort: Default</option>
                    <option value="name-asc">Name (A→Z)</option>
                    <option value="lunch-asc">Lunch price (low→high)</option>
                    <option value="lunch-desc">Lunch price (high→low)</option>
                    <option value="dinner-asc">Dinner price (low→high)</option>
                    <option value="dinner-desc">Dinner price (high→low)</option>
                    <option value="distance" disabled>Distance (Near me)</option>
                </select>
            </div>

            <select id="cuisineFilter" class="visually-hidden" aria-hidden="true" tabindex="-1">
                <option value="">All Cuisines</option>
            </select>

            <div class="cuisine-picker">
                <button id="cuisineTrigger" class="cuisine-trigger" type="button" aria-haspopup="dialog" aria-expanded="false">
                    <span class="cuisine-trigger-emoji">🍽️</span>
                    <span class="cuisine-trigger-label">All cuisines</span>
                    <span class="cuisine-trigger-caret">▾</span>
                </button>
                <div id="cuisinePopover" class="cuisine-popover" role="dialog" aria-label="Choose cuisine"></div>
            </div>

            <div class="filter-select">
                <select id="neighbourhoodFilter">
                    <option value="">All Neighbourhoods</option>
                </select>
            </div>

            <div class="filter-select">
                <select id="priceFilter">
                    <option value="">Any Price</option>
                </select>
            </div>

            <div class="toggle-group">
                <input type="checkbox" id="vegFilter" style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                <label for="vegFilter" style="cursor: pointer; user-select: none;">Veg/Vegan Option</label>
            </div>

            <div class="toggle-group">
                <input type="checkbox" id="favFilter" style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                <label for="favFilter" style="cursor: pointer; user-select: none;">❤ Favorites</label>
            </div>

            <div class="toggle-group">
                <input type="checkbox" id="michelinFilter">
                <label for="michelinFilter">Michelin</label>
            </div>

            <div class="toggle-group">
                <input type="checkbox" id="lunchFilter">
                <label for="lunchFilter">Has Lunch</label>
            </div>

            <div class="toggle-group">
                <input type="checkbox" id="dinnerFilter">
                <label for="dinnerFilter">Has Dinner</label>
            </div>

            <div class="toggle-group">
                <input type="checkbox" id="bookableFilter">
                <label for="bookableFilter">Bookable online</label>
            </div>

            <button id="nearMeBtn" class="near-me-btn" title="Sort by distance from your location">📍 Near me</button>

            <div class="view-toggles">
                <button class="view-btn active" id="btnListView">List</button>
                <button class="view-btn" id="btnMapView">Map</button>
            </div>
        </div>

        <div id="map-view"></div>

        <div class="result-bar">
            <div class="result-bar-left">
                <span id="result-count"></span>
                <span id="vibeFilterChips" class="vibe-filter-chips"></span>
            </div>
            <button id="resetBtn" class="link-btn" hidden>Reset filters</button>
        </div>

        <div id="restaurantGrid" class="grid"></div>
    </div>

</main>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-hero" id="modalHero">
            <button class="close-btn" id="closeModal" aria-label="Close">&times;</button>
            <div class="modal-hero-inner">
                <div class="modal-hero-emoji" id="modalEmoji"></div>
                <h2 id="modalTitle">Restaurant Name</h2>
                <div id="modalSubline" class="modal-subline"></div>
                <p id="modalAddress" class="modal-address"></p>
                <div id="modalBadges" class="badges-row"></div>
            </div>
        </div>

        <div class="modal-action-bar" id="modalActions"></div>

        <div id="modalAISummary" class="modal-ai-summary"></div>

        <div class="menu-tabs">
            <div class="tab" id="tabLunch" data-target="lunchContent">Lunch</div>
            <div class="tab" id="tabDinner" data-target="dinnerContent">Dinner</div>
        </div>

        <div class="modal-body">
            <div id="lunchContent" class="menu-content"></div>
            <div id="dinnerContent" class="menu-content"></div>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
